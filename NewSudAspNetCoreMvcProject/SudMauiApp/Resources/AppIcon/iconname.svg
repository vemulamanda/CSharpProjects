<svg viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
    <!-- Transparent background -->
    <rect width="456" height="456" fill="none"/>

    <!-- Safe border (inset so Android won't crop it) -->
    <rect
        x="20"
        y="20"
        width="416"
        height="416"
        rx="40"
        ry="40"
        fill="none"
        stroke="#33cc00"
        stroke-width="12"
    />

    <!-- FARM text -->
    <text
        x="53%"
        y="57%"
        font-family="sans-serif"
        font-size="100"
        font-weight="bold"
        font-style="italic"
        fill="#1a6600"
        text-anchor="middle"
        dominant-baseline="central">
        FARM
    </text>
</svg>
