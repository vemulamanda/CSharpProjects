<svg width="400" height="800" viewBox="0 0 400 800"
     xmlns="http://www.w3.org/2000/svg">
	<!-- Background gradient -->
	<defs>
		<linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#4fd3ff"/>
			<stop offset="50%" stop-color="#1a9ad6"/>
			<stop offset="100%" stop-color="#024a7a"/>
		</linearGradient>
	</defs>

	<!-- Water background -->
	<rect width="400" height="800" fill="url(#waterGrad)" />

	<!-- Light rays -->
	<g opacity="0.25">
		<polygon points="40,0 80,0 40,300" fill="#ffffff"/>
		<polygon points="140,0 180,0 120,320" fill="#ffffff"/>
		<polygon points="260,0 300,0 240,310" fill="#ffffff"/>
	</g>

	<!-- Simple waves near middle -->
	<path d="M0 420 Q 50 400 100 420 T 200 420 T 300 420 T 400 420
           L400 460 L0 460 Z"
		  fill="#1b8fc4" opacity="0.7"/>

	<!-- Fish on the left -->
	<g transform="translate(40,320)">
		<!-- Body -->
		<ellipse cx="80" cy="40" rx="55" ry="28" fill="#ffb347"/>
		<!-- Tail -->
		<polygon points="30,40 0,20 0,60" fill="#ff9933"/>
		<!-- Eye -->
		<circle cx="110" cy="35" r="6" fill="#ffffff"/>
		<circle cx="112" cy="35" r="3" fill="#000000"/>
		<!-- Top fin -->
		<polygon points="70,25 55,5 60,30" fill="#ffcc66" opacity="0.9"/>
		<!-- Bottom fin -->
		<polygon points="70,55 55,70 60,50" fill="#ffcc66" opacity="0.9"/>
	</g>

	<!-- Prawn on the right -->
	<g transform="translate(200,360)">
		<!-- Segmented body -->
		<ellipse cx="80" cy="40" rx="38" ry="22" fill="#ff8a65"/>
		<ellipse cx="58" cy="40" rx="30" ry="20" fill="#ff7043"/>
		<ellipse cx="38" cy="40" rx="22" ry="16" fill="#ff5722"/>
		<!-- Head -->
		<ellipse cx="22" cy="36" rx="18" ry="15" fill="#ffab91"/>
		<!-- Eye -->
		<circle cx="16" cy="32" r="3" fill="#000000"/>
		<!-- Antennae -->
		<path d="M22 30 C 0 10, -20 0, -40 5" stroke="#ffe0b2" stroke-width="2" fill="none"/>
		<path d="M22 33 C 0 22, -25 15, -45 20" stroke="#ffe0b2" stroke-width="2" fill="none"/>
		<!-- Tail -->
		<polygon points="115,40 135,30 135,50" fill="#ff7043"/>
		<!-- Legs -->
		<path d="M42 55 L32 70" stroke="#ffccbc" stroke-width="3"/>
		<path d="M57 57 L47 72" stroke="#ffccbc" stroke-width="3"/>
		<path d="M72 58 L62 73" stroke="#ffccbc" stroke-width="3"/>
	</g>

	<!-- Some bubbles -->
	<g fill="#e0f7ff" opacity="0.8">
		<circle cx="60" cy="500" r="4"/>
		<circle cx="80" cy="540" r="3"/>
		<circle cx="300" cy="520" r="4"/>
		<circle cx="280" cy="560" r="3"/>
		<circle cx="200" cy="600" r="5"/>
	</g>
</svg>
